<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 시작 홈페이지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FAFBFC;
    --card: #FFFFFF;
    --line: #E9EEF3;
    --ink: #1A2B3C;
    --sub: #8B98A5;
    --blue: #2F7DE1;
    --blue-soft: #EAF2FE;
    --mint: #17B993;
    --mint-soft: #E7F9F3;
    --sun: #FFB627;
    --sun-soft: #FFF4DE;
    --sky-a: #6FB3FF;
    --sky-b: #2F7DE1;
    --radius: 18px;
    --shadow: 0 4px 16px rgba(26,43,60,0.06), 0 1px 3px rgba(26,43,60,0.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    font-family:'Inter',sans-serif;
    color:var(--ink);
    min-height:100vh;
    padding-bottom:60px;
  }
  .sky-strip{
    height:6px;
    width:100%;
    background:linear-gradient(90deg, var(--sky-a), var(--sky-b));
    transition:background 1.2s ease;
  }
  .wrap{
    max-width:960px;
    margin:0 auto;
    padding:0 24px;
  }
  .hero{
    padding:56px 0 40px;
    text-align:center;
  }
  .greeting{
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:22px;
    color:var(--blue);
    margin:0 0 6px;
    letter-spacing:-0.2px;
    transition:color 1.2s ease;
  }
  .clock{
    font-family:'IBM Plex Mono',monospace;
    font-weight:600;
    font-size:clamp(48px, 10vw, 84px);
    letter-spacing:-1px;
    line-height:1;
    margin:8px 0;
  }
  .date{
    font-size:15px;
    color:var(--sub);
    font-weight:500;
  }
  .section{
    margin-top:28px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:24px;
  }
  .card-title{
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:14px;
    color:var(--sub);
    text-transform:uppercase;
    letter-spacing:0.08em;
    margin:0 0 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .card-title span.count{
    font-family:'IBM Plex Mono',monospace;
    color:var(--blue);
    text-transform:none;
    letter-spacing:0;
    font-size:12px;
  }
  /* Weather cards */
  .weather-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
  }
  @media(max-width:640px){
    .weather-grid{grid-template-columns:1fr;}
  }
  .weather-main{
    display:flex;
    align-items:center;
    gap:16px;
  }
  .weather-icon{
    font-size:48px;
    line-height:1;
  }
  .weather-temp{
    font-family:'IBM Plex Mono',monospace;
    font-size:38px;
    font-weight:600;
  }
  .weather-desc{
    font-size:14px;
    color:var(--sub);
    margin-top:2px;
  }
  .weather-loc{
    font-size:13px;
    color:var(--blue);
    font-weight:600;
    margin-top:2px;
  }
  .weather-sub{
    display:flex;
    gap:22px;
    margin-top:18px;
    padding-top:16px;
    border-top:1px solid var(--line);
  }
  .weather-sub div{font-size:13px;color:var(--sub);}
  .weather-sub b{
    display:block;
    font-family:'IBM Plex Mono',monospace;
    font-size:17px;
    color:var(--ink);
    font-weight:600;
    margin-top:2px;
  }
  .weather-state{
    font-size:13px;
    color:var(--sub);
    margin-top:14px;
  }
  /* News card */
  .news-list{
    list-style:none;
    margin:0;
    padding:0;
    min-height:120px;
  }
  .news-list li{
    border-bottom:1px solid var(--line);
  }
  .news-list li:last-child{border-bottom:none;}
  .news-list a{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:16px;
    padding:13px 2px;
    color:var(--ink);
    text-decoration:none;
    line-height:1.4;
  }
  .news-list a:hover .news-title{color:var(--blue);}
  .news-title{
    font-size:14.5px;
    font-weight:500;
    color:var(--ink);
  }
  .news-tag{
    display:inline-block;
    font-family:'Space Grotesk',sans-serif;
    font-size:10.5px;
    font-weight:700;
    padding:2px 7px;
    border-radius:6px;
    margin-right:8px;
    vertical-align:middle;
    letter-spacing:0.02em;
  }
  .news-tag.AI{background:var(--blue-soft); color:var(--blue);}
  .news-tag.DX{background:var(--mint-soft); color:var(--mint);}
  .news-tag.RX{background:var(--sun-soft); color:#B5780F;}
  .news-tag.KR{background:var(--blue-soft); color:var(--blue);}
  .news-meta{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    color:var(--sub);
    white-space:nowrap;
    flex-shrink:0;
    text-align:right;
    line-height:1.6;
  }
  .news-meta .news-source{
    display:block;
    color:var(--sub);
  }
  .news-empty, .news-error{
    color:var(--sub);
    font-size:14px;
    padding:20px 2px;
  }
  .news-more-wrap{
    margin-top:16px;
    text-align:center;
  }
  .news-more-btn{
    border:1px solid var(--line);
    background:var(--card);
    color:var(--blue);
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:13px;
    padding:10px 22px;
    border-radius:999px;
    cursor:pointer;
    box-shadow:0 2px 8px rgba(26,43,60,0.04);
  }
  .news-more-btn:hover{
    background:var(--blue-soft);
    border-color:#D6E5FB;
  }
  .news-more-btn[hidden]{
    display:none;
  }

  /* Search */
  .search-box{
    display:flex;
    align-items:center;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:999px;
    box-shadow:var(--shadow);
    padding:6px 6px 6px 22px;
  }
  .search-box svg{flex-shrink:0;}
  .search-box input{
    flex:1;
    border:none;
    outline:none;
    background:transparent;
    font-family:'Inter',sans-serif;
    font-size:15px;
    padding:12px 10px;
    color:var(--ink);
  }
  .search-box button{
    border:none;
    background:var(--blue);
    color:#fff;
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:14px;
    padding:12px 24px;
    border-radius:999px;
    cursor:pointer;
    transition:background 0.15s ease;
  }
  .search-box button:hover{background:#2468c4;}
  /* Todo */
  .todo-form{
    display:flex;
    gap:8px;
    margin-bottom:16px;
  }
  .todo-form input{
    flex:1;
    border:1px solid var(--line);
    border-radius:10px;
    padding:11px 14px;
    font-size:14px;
    font-family:'Inter',sans-serif;
    outline:none;
    color:var(--ink);
  }
  .todo-form input:focus{border-color:var(--blue);}
  .todo-form button{
    border:none;
    background:var(--blue);
    color:#fff;
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:14px;
    padding:0 20px;
    border-radius:10px;
    cursor:pointer;
  }
  .todo-form button:hover{background:#2468c4;}
  .todo-list{
    list-style:none;
    margin:0;
    padding:0;
  }
  .todo-list li{
    display:flex;
    align-items:center;
    gap:12px;
    padding:11px 2px;
    border-bottom:1px solid var(--line);
  }
  .todo-list li:last-child{border-bottom:none;}
  .todo-check{
    width:20px;
    height:20px;
    border-radius:6px;
    border:2px solid var(--line);
    flex-shrink:0;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    background:none;
    color:#fff;
    font-size:13px;
    transition:all 0.15s ease;
  }
  .todo-check.done{
    background:var(--mint);
    border-color:var(--mint);
  }
  .todo-text{
    flex:1;
    font-size:14.5px;
    color:var(--ink);
  }
  .todo-text.done{
    color:var(--sub);
    text-decoration:line-through;
  }
  .todo-remove{
    border:none;
    background:none;
    color:var(--sub);
    font-size:14px;
    cursor:pointer;
    padding:4px 6px;
    border-radius:6px;
    flex-shrink:0;
  }
  .todo-remove:hover{background:#FDE8E8; color:#D64545;}
  .todo-empty{
    color:var(--sub);
    font-size:14px;
    padding:16px 2px;
  }
  .todo-progress{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--sub);
    margin-top:14px;
  }
</style>
</head>
<body>

<div class="sky-strip" id="skyStrip"></div>

<div class="wrap">
  <div class="hero">
    <p class="greeting" id="greeting">안녕하세요 ☀️</p>
    <div class="clock" id="clock">00:00:00</div>
    <div class="date" id="dateStr">-</div>
  </div>

  <div class="section">
    <form class="search-box" id="searchForm" action="https://www.google.com/search" method="GET" target="_blank">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8B98A5" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" name="q" placeholder="구글에서 검색하기" autocomplete="off">
      <button type="submit">검색</button>
    </form>
  </div>

  <!-- Weather -->
  <div class="section">
    <div class="weather-grid" id="weatherGrid">
      <div class="card">
        <p class="card-title">의왕시 포일동 날씨</p>
        <div class="weather-body" id="weatherBody-uiwang">
          <div class="weather-state">날씨 정보를 불러오는 중...</div>
        </div>
      </div>
      <div class="card">
        <p class="card-title">서울 송파구 날씨</p>
        <div class="weather-body" id="weatherBody-songpa">
          <div class="weather-state">날씨 정보를 불러오는 중...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- News -->
  <div class="section">
    <div class="card">
      <p class="card-title">한국 IT 뉴스 (최근 7일) <span class="count" id="newsCount"></span></p>
      <ul class="news-list" id="newsList">
        <li class="news-empty">뉴스를 불러오는 중...</li>
      </ul>
      <div class="news-more-wrap">
        <button type="button" class="news-more-btn" id="newsMoreBtn" hidden>더 보기</button>
      </div>
    </div>
  </div>

  <!-- Todo -->
  <div class="section">
    <div class="card">
      <p class="card-title">오늘의 할 일</p>
      <form class="todo-form" id="todoForm">
        <input type="text" id="todoInput" placeholder="할 일을 입력하고 Enter 또는 추가 버튼을 누르세요" autocomplete="off">
        <button type="submit">추가</button>
      </form>
      <ul class="todo-list" id="todoList"></ul>
      <div class="todo-progress" id="todoProgress"></div>
    </div>
  </div>

</div>

<script>
/* ---------- Sky strip + clock + greeting ---------- */
const skyPalettes = [
  {h:[0,5],   a:'#2B2A5A', b:'#4A3A78', greet:'#B9A4E8', name:'깊은 새벽'},
  {h:[5,7],   a:'#F7A6A0', b:'#FFC97A', greet:'#E08A4C', name:'새벽'},
  {h:[7,11],  a:'#8FC7FF', b:'#4E9BF5', greet:'#2F7DE1', name:'아침'},
  {h:[11,16], a:'#6FB3FF', b:'#2F7DE1', greet:'#2F7DE1', name:'낮'},
  {h:[16,18], a:'#FFC97A', b:'#FF8A5B', greet:'#E0703A', name:'오후'},
  {h:[18,20], a:'#FF8A5B', b:'#6A4A9E', greet:'#B25AA0', name:'저녁'},
  {h:[20,24], a:'#2B2A5A', b:'#1A2B3C', greet:'#7C8FE0', name:'밤'},
];
function getPalette(hour){
  return skyPalettes.find(p => hour >= p.h[0] && hour < p.h[1]) || skyPalettes[0];
}
function greetingText(hour){
  if(hour < 5) return '늦은 밤이에요 🌙';
  if(hour < 7) return '좋은 새벽이에요 🌅';
  if(hour < 11) return '좋은 아침이에요 ☀️';
  if(hour < 14) return '점심은 드셨나요 🍽️';
  if(hour < 18) return '활기찬 오후예요 🌤️';
  if(hour < 20) return '편안한 저녁이에요 🌇';
  return '오늘 하루도 고생하셨어요 🌙';
}
function pad(n){return n.toString().padStart(2,'0');}
function updateClock(){
  const now = new Date();
  const h = now.getHours();
  document.getElementById('clock').textContent = `${pad(h)}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('dateStr').textContent =
    `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
  const pal = getPalette(h);
  document.getElementById('skyStrip').style.background = `linear-gradient(90deg, ${pal.a}, ${pal.b})`;
  document.getElementById('greeting').style.color = pal.greet;
  document.getElementById('greeting').textContent = greetingText(h);
}
updateClock();
setInterval(updateClock, 1000);

function fetchWithTimeout(url, ms = 6000){
  const timeoutPromise = new Promise((_, reject) => {
    setTimeout(() => reject(new Error('요청 시간 초과')), ms);
  });
  return Promise.race([fetch(url), timeoutPromise]);
}

/* ---------- Weather ---------- */
const weatherIcon = (code) => {
  if(code === 0) return '☀️';
  if([1,2].includes(code)) return '🌤️';
  if(code === 3) return '☁️';
  if([45,48].includes(code)) return '🌫️';
  if([51,53,55,56,57].includes(code)) return '🌦️';
  if([61,63,65,66,67,80,81,82].includes(code)) return '🌧️';
  if([71,73,75,77,85,86].includes(code)) return '🌨️';
  if([95,96,99].includes(code)) return '⛈️';
  return '🌡️';
};
const weatherDesc = (code) => {
  const map = {
    0:'맑음',1:'대체로 맑음',2:'구름 조금',3:'흐림',
    45:'안개',48:'짙은 안개',
    51:'약한 이슬비',53:'이슬비',55:'강한 이슬비',
    56:'약한 어는 비',57:'어는 비',
    61:'약한 비',63:'비',65:'강한 비',
    66:'약한 어는 비',67:'어는 비',
    71:'약한 눈',73:'눈',75:'강한 눈',77:'싸락눈',
    80:'약한 소나기',81:'소나기',82:'강한 소나기',
    85:'약한 눈 소나기',86:'강한 눈 소나기',
    95:'뇌우',96:'뇌우(우박)',99:'강한 뇌우(우박)'
  };
  return map[code] || '알 수 없음';
};

// 각 지역: 이름 검색 실패 시 사용할 대체 좌표
const weatherLocations = [
  { elId: 'weatherBody-uiwang', label: '의왕시 포일동', geocodeQuery: '포일동', fallbackLat: 37.3903, fallbackLon: 126.9761 },
  { elId: 'weatherBody-songpa', label: '서울 송파구', geocodeQuery: '송파구', fallbackLat: 37.5145, fallbackLon: 127.1059 },
];

async function geocode(query){
  const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=ko&format=json`;
  const res = await fetchWithTimeout(url);
  if(!res.ok) throw new Error('geocode failed');
  const data = await res.json();
  if(!data.results || data.results.length === 0) throw new Error('no geocode result');
  return { lat: data.results[0].latitude, lon: data.results[0].longitude };
}

async function loadWeatherFor(loc){
  const bodyEl = document.getElementById(loc.elId);
  let lat = loc.fallbackLat, lon = loc.fallbackLon;
  try{
    const geo = await geocode(loc.geocodeQuery);
    lat = geo.lat;
    lon = geo.lon;
  }catch(e){
    // 지오코딩 실패 시 대체 좌표 사용
  }
  try{
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weather_code&daily=temperature_2m_max,temperature_2m_min&timezone=auto`;
    const res = await fetchWithTimeout(url);
    if(!res.ok) throw new Error(`weather fetch failed: HTTP ${res.status}`);
    const data = await res.json();
    const cur = data.current;
    const daily = data.daily;
    bodyEl.innerHTML = `
      <div class="weather-main">
        <div class="weather-icon">${weatherIcon(cur.weather_code)}</div>
        <div>
          <div class="weather-temp">${Math.round(cur.temperature_2m)}°</div>
          <div class="weather-desc">${weatherDesc(cur.weather_code)} · 체감 ${Math.round(cur.apparent_temperature)}°</div>
          <div class="weather-loc">📍 ${loc.label}</div>
        </div>
      </div>
      <div class="weather-sub">
        <div>최고<b>${Math.round(daily.temperature_2m_max[0])}°</b></div>
        <div>최저<b>${Math.round(daily.temperature_2m_min[0])}°</b></div>
      </div>
    `;
  }catch(e){
    bodyEl.innerHTML = `<div class="news-error">날씨 정보를 불러오지 못했어요. 잠시 후 새로고침해 주세요.</div>`;
  }
}
function initWeather(){
  weatherLocations.forEach(loc => loadWeatherFor(loc));
}
initWeather();

/* ---------- News (한국 IT 뉴스, 최근 7일, 로컬 file:// 대응 JSONP) ---------- */
// file://로 HTML을 직접 열면 fetch/RSS 요청이 막히는 경우가 많습니다.
// 그래서 뉴스는 <script> 태그 기반 JSONP를 지원하는 rss2json API로 가져옵니다.
// rss2json 공식 문서의 callback 파라미터(JSONP)를 사용합니다.
const RSS_DAYS = 7;
const MAX_NEWS = 40;
const NEWS_PAGE_SIZE = 10;
let allNewsItems = [];
let visibleNewsCount = NEWS_PAGE_SIZE;
const JSONP_TIMEOUT_MS = 8000;
const newsFeeds = [
  {
    source: '지디넷코리아',
    tag: 'IT',
    rss: 'https://news.google.com/rss/search?q=site%3Azdnet.co.kr%20%28AI%20OR%20%EC%9D%B8%EA%B3%B5%EC%A7%80%EB%8A%A5%20OR%20%ED%81%B4%EB%9D%BC%EC%9A%B0%EB%93%9C%20OR%20%EB%B3%B4%EC%95%88%20OR%20%EB%B0%98%EB%8F%84%EC%B2%B4%20OR%20IT%29%20when%3A7d&hl=ko&gl=KR&ceid=KR%3Ako'
  },
  {
    source: '전자신문',
    tag: 'IT',
    rss: 'https://news.google.com/rss/search?q=site%3Aetnews.com%20%28AI%20OR%20%EC%9D%B8%EA%B3%B5%EC%A7%80%EB%8A%A5%20OR%20%ED%81%B4%EB%9D%BC%EC%9A%B0%EB%93%9C%20OR%20%EB%B3%B4%EC%95%88%20OR%20%EB%B0%98%EB%8F%84%EC%B2%B4%20OR%20IT%29%20when%3A7d&hl=ko&gl=KR&ceid=KR%3Ako'
  },
  {
    source: '디지털데일리',
    tag: 'IT',
    rss: 'https://news.google.com/rss/search?q=site%3Addaily.co.kr%20%28AI%20OR%20%EC%9D%B8%EA%B3%B5%EC%A7%80%EB%8A%A5%20OR%20%ED%81%B4%EB%9D%BC%EC%9A%B0%EB%93%9C%20OR%20%EB%B3%B4%EC%95%88%20OR%20%EB%B0%98%EB%8F%84%EC%B2%B4%20OR%20IT%29%20when%3A7d&hl=ko&gl=KR&ceid=KR%3Ako'
  },
  {
    source: '블로터',
    tag: 'IT',
    rss: 'https://news.google.com/rss/search?q=site%3Abloter.net%20%28AI%20OR%20%EC%9D%B8%EA%B3%B5%EC%A7%80%EB%8A%A5%20OR%20%ED%81%B4%EB%9D%BC%EC%9A%B0%EB%93%9C%20OR%20%EB%B3%B4%EC%95%88%20OR%20%EB%B0%98%EB%8F%84%EC%B2%B4%20OR%20IT%29%20when%3A7d&hl=ko&gl=KR&ceid=KR%3Ako'
  }
];
function decodeHtml(str){
  const txt = document.createElement('textarea');
  txt.innerHTML = str || '';
  return txt.value;
}
function cleanTitle(title){
  return decodeHtml(title)
    .replace(/\s-\s(지디넷코리아|전자신문|디지털데일리|블로터|Google News)$/,'')
    .trim();
}
function formatDateFromDate(d){
  return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())}`;
}
function timeAgoFromDate(d){
  const diffSec = Math.max(0, Math.floor((Date.now() - d.getTime()) / 1000));
  const h = Math.floor(diffSec/3600);
  if(h < 1) return `${Math.max(1,Math.floor(diffSec/60))}분 전`;
  if(h < 24) return `${h}시간 전`;
  return `${Math.floor(h/24)}일 전`;
}
function jsonp(url, timeoutMs = JSONP_TIMEOUT_MS){
  return new Promise((resolve, reject) => {
    const callbackName = `jsonp_cb_${Date.now()}_${Math.random().toString(36).slice(2)}`;
    const script = document.createElement('script');
    const sep = url.includes('?') ? '&' : '?';
    let done = false;
    const timer = setTimeout(() => cleanup(new Error('뉴스 요청 시간 초과')), timeoutMs);

    function cleanup(err, data){
      if(done) return;
      done = true;
      clearTimeout(timer);
      try{ delete window[callbackName]; }catch(e){ window[callbackName] = undefined; }
      if(script.parentNode) script.parentNode.removeChild(script);
      err ? reject(err) : resolve(data);
    }

    window[callbackName] = data => cleanup(null, data);
    script.onerror = () => cleanup(new Error('뉴스 스크립트 로드 실패'));
    script.src = `${url}${sep}callback=${callbackName}`;
    document.body.appendChild(script);
  });
}
async function fetchFeed(feed){
  const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.rss)}`;
  try{
    const data = await jsonp(api);
    if(!data || data.status !== 'ok' || !Array.isArray(data.items)) return [];
    const since = Date.now() - RSS_DAYS * 24 * 60 * 60 * 1000;
    return data.items.map(item => {
      const pubDate = new Date(item.pubDate || item.pubdate || item.published || item.created || '');
      return {
        title: cleanTitle(item.title || ''),
        link: item.link || item.guid || '#',
        source: feed.source,
        tag: feed.tag,
        pubDate,
        key: `${cleanTitle(item.title || '')}|${item.link || item.guid || ''}`
      };
    }).filter(n => n.title && n.link && !Number.isNaN(n.pubDate.getTime()) && n.pubDate.getTime() >= since);
  }catch(e){
    console.warn('뉴스 로드 실패:', feed.source, e);
    return [];
  }
}
async function loadAllNews(){
  const listEl = document.getElementById('newsList');
  const countEl = document.getElementById('newsCount');
  listEl.innerHTML = `<li class="news-empty">뉴스를 불러오는 중...</li>`;
  countEl.textContent = '';

  const results = await Promise.all(newsFeeds.map(fetchFeed));
  const merged = results.flat();
  const seen = new Set();
  const deduped = [];
  for(const item of merged){
    const key = item.key.toLowerCase();
    if(seen.has(key)) continue;
    seen.add(key);
    deduped.push(item);
  }
  deduped.sort((a, b) => b.pubDate - a.pubDate);
  allNewsItems = deduped.slice(0, MAX_NEWS);
  visibleNewsCount = NEWS_PAGE_SIZE;
  renderNewsPage();
}
function renderNewsPage(){
  renderNews(allNewsItems.slice(0, visibleNewsCount), allNewsItems.length);
}
function updateNewsMoreButton(total){
  const moreBtn = document.getElementById('newsMoreBtn');
  if(!moreBtn) return;
  const remain = Math.max(0, total - visibleNewsCount);
  moreBtn.hidden = remain <= 0;
  moreBtn.textContent = remain > 0 ? `더 보기 (${remain}건 남음)` : '더 보기';
}
function renderNews(items, totalCount){
  const listEl = document.getElementById('newsList');
  const countEl = document.getElementById('newsCount');
  const total = typeof totalCount === 'number' ? totalCount : (items ? items.length : 0);
  if(!items || items.length === 0){
    const fallback = [
      {source:'지디넷코리아', link:'https://news.google.com/search?q=site%3Azdnet.co.kr%20IT%20when%3A7d&hl=ko&gl=KR&ceid=KR%3Ako'},
      {source:'전자신문', link:'https://news.google.com/search?q=site%3Aetnews.com%20IT%20when%3A7d&hl=ko&gl=KR&ceid=KR%3Ako'},
      {source:'디지털데일리', link:'https://news.google.com/search?q=site%3Addaily.co.kr%20IT%20when%3A7d&hl=ko&gl=KR&ceid=KR%3Ako'},
      {source:'블로터', link:'https://news.google.com/search?q=site%3Abloter.net%20IT%20when%3A7d&hl=ko&gl=KR&ceid=KR%3Ako'}
    ];
    listEl.innerHTML = fallback.map(f => `<li><a href="${f.link}" target="_blank" rel="noopener">
      <span class="news-title"><span class="news-tag IT">${f.source}</span>최근 7일 뉴스 검색 열기</span>
      <span class="news-meta">대체 링크<span class="news-source">RSS/JSONP 실패</span></span>
    </a></li>`).join('');
    countEl.textContent = '대체';
    updateNewsMoreButton(0);
    return;
  }
  countEl.textContent = `${Math.min(visibleNewsCount, total)} / ${total}건`;
  listEl.innerHTML = items.map(n => {
    const title = n.title.replace(/</g,'&lt;');
    const safeLink = n.link.replace(/"/g, '&quot;');
    return `<li><a href="${safeLink}" target="_blank" rel="noopener">
      <span class="news-title"><span class="news-tag ${n.tag}">${n.source}</span>${title}</span>
      <span class="news-meta">${formatDateFromDate(n.pubDate)}<span class="news-source">${timeAgoFromDate(n.pubDate)}</span></span>
    </a></li>`;
  }).join('');
  updateNewsMoreButton(total);
}
document.getElementById('newsMoreBtn').addEventListener('click', () => {
  visibleNewsCount += NEWS_PAGE_SIZE;
  renderNewsPage();
});
loadAllNews();

/* ---------- 오늘의 할 일 ---------- */
function loadTodos(){
  try{
    const raw = localStorage.getItem('home_todos');
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}
function saveTodos(todos){
  try{ localStorage.setItem('home_todos', JSON.stringify(todos)); }catch(e){}
}
function renderTodos(){
  const todos = loadTodos();
  const listEl = document.getElementById('todoList');
  const progressEl = document.getElementById('todoProgress');
  if(todos.length === 0){
    listEl.innerHTML = `<li class="todo-empty">아직 등록된 할 일이 없어요. 위에 입력해서 추가해 보세요.</li>`;
    progressEl.textContent = '';
    return;
  }
  listEl.innerHTML = todos.map((t, i) => `
    <li>
      <button class="todo-check ${t.done ? 'done' : ''}" data-idx="${i}" aria-label="완료 표시">${t.done ? '✓' : ''}</button>
      <span class="todo-text ${t.done ? 'done' : ''}">${(t.text || '').replace(/</g,'&lt;')}</span>
      <button class="todo-remove" data-idx="${i}" title="삭제">✕</button>
    </li>
  `).join('');
  const doneCount = todos.filter(t => t.done).length;
  progressEl.textContent = `${doneCount} / ${todos.length} 완료`;

  listEl.querySelectorAll('.todo-check').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx);
      const todos = loadTodos();
      todos[idx].done = !todos[idx].done;
      saveTodos(todos);
      renderTodos();
    });
  });
  listEl.querySelectorAll('.todo-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx);
      const todos = loadTodos();
      todos.splice(idx, 1);
      saveTodos(todos);
      renderTodos();
    });
  });
}
document.getElementById('todoForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const input = document.getElementById('todoInput');
  const text = input.value.trim();
  if(!text) return;
  const todos = loadTodos();
  todos.push({ text, done: false });
  saveTodos(todos);
  input.value = '';
  renderTodos();
});
renderTodos();
</script>
